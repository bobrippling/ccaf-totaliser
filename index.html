<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Certified Architect - Foundations</title>

    <!-- Link preview (Open Graph / Slack / WhatsApp) -->
    <meta property="og:title" content="Claude Certified Architect - Foundations totaliser">
    <meta property="og:description" content="CCA-F exam results: 7/9 passed, 4 pending">
    <meta property="og:image" content="https://bobrippling.github.io/ccaf-totaliser/totaliser.webp">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="CCA-F exam totaliser" />
    <script src="tailwind.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a0535;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(220, 38, 127, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
        }
        .font-display {
            font-family: 'Russo One', sans-serif;
        }
        .number-flicker {
            transition: all 0.3s ease-in-out;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6), 0 0 20px currentColor;
        }
        /* Rainbow ring border — mimics the stacked coloured rings */
        .rainbow-border {
            background: linear-gradient(180deg,
                #ef4444 0%,
                #f97316 16%,
                #eab308 33%,
                #22c55e 50%,
                #06b6d4 66%,
                #3b82f6 83%,
                #8b5cf6 100%
            );
            padding: 3px;
            border-radius: 1.5rem;
        }
        .card-green  { background: rgba(34,197,94,0.12);  border: 2px solid #22c55e; box-shadow: 0 0 24px rgba(34,197,94,0.25); }
        .card-amber  { background: rgba(234,179,8,0.12);  border: 2px solid #eab308; box-shadow: 0 0 24px rgba(234,179,8,0.25); }
        .card-blue   { background: rgba(59,130,246,0.12); border: 2px solid #3b82f6; box-shadow: 0 0 24px rgba(59,130,246,0.25); }
        .card-base   { border-radius: 1rem; padding: 1rem 1.5rem; text-align: center; transition: all 0.3s; display: flex; flex-direction: column; justify-content: center; }
        #reveal-overlay { transition: opacity 0.5s ease-in-out; }
        #main-content   { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <!-- Click to Reveal Overlay -->
    <div id="reveal-overlay" class="fixed inset-0 backdrop-blur-sm flex flex-col items-center justify-center z-50 text-center p-4"
         style="background: rgba(26,5,53,0.85)">
        <div class="flex items-center justify-center gap-4 mb-4">
            <span class="text-6xl">🎓</span>
            <img src="claude.png" width="64" height="64" alt="Claude logo">
        </div>
        <h1 class="font-display text-3xl sm:text-5xl font-bold tracking-wider"
            style="color:#fde047; text-shadow: 0 0 20px rgba(253,224,71,0.5)">Claude Certified Architect</h1>
        <p class="font-display text-xl sm:text-2xl mt-1" style="color:#fb923c">Foundations</p>
        <button id="reveal-button"
                class="mt-8 font-display text-2xl text-white font-bold py-4 px-8 rounded-full transform transition-transform duration-200 hover:scale-105"
                style="background: linear-gradient(135deg, #ef4444, #f97316, #eab308); box-shadow: 0 8px 32px rgba(249,115,22,0.4)">
            CLICK TO REVEAL EXAM PASSES
        </button>
    </div>

    <div id="main-content" class="w-full max-w-3xl mx-auto space-y-6 sm:space-y-8 opacity-0">
        <!-- Header -->
        <header class="text-center">
            <div class="flex items-center justify-center gap-3 mb-2">
                <span class="text-5xl">🎓</span>
                <img src="claude.png" width="52" height="52" alt="Claude logo">
            </div>
            <h1 class="font-display text-3xl sm:text-4xl font-bold tracking-wider"
                style="color:#fde047; text-shadow: 0 0 20px rgba(253,224,71,0.4)">Claude Certified Architect</h1>
            <p class="font-display text-xl" style="color:#fb923c">Foundations</p>
        </header>

        <!-- Rainbow divider strip -->
        <div class="rounded-full h-2 w-full" style="background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6)"></div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <!-- Passed -->
            <div class="card-base card-green">
                <h3 class="font-display text-xl sm:text-2xl mb-2" style="color:#4ade80">PASSED</h3>
                <div id="passedCount" class="text-5xl sm:text-6xl font-bold text-white number-flicker" style="color:#4ade80">0</div>
            </div>

            <!-- Awaiting Results -->
            <div class="card-base card-amber">
                <h3 class="font-display text-base sm:text-xl mb-2 whitespace-nowrap" style="color:#facc15">AWAITING RESULTS</h3>
                <div id="pendingCount" class="text-5xl sm:text-6xl font-bold number-flicker" style="color:#facc15">0</div>
            </div>

            <!-- Attempted -->
            <div class="card-base card-blue">
                <h3 class="font-display text-xl sm:text-2xl mb-2" style="color:#60a5fa">ATTEMPTED</h3>
                <div id="attemptedCount" class="text-5xl sm:text-6xl font-bold number-flicker" style="color:#60a5fa">0</div>
            </div>
        </div>

        <!-- Passes Over Time Chart -->
        <div class="rounded-2xl shadow-2xl p-4 sm:p-6" style="background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.1)">
            <h2 class="font-display text-xl sm:text-2xl font-bold tracking-widest uppercase text-center mb-4" style="color:#e2e8f0">Passes Over Time</h2>
            <canvas id="passChart"></canvas>
        </div>

        <!-- Rainbow divider strip (bottom) -->
        <div class="rounded-full h-2 w-full" style="background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4, #22c55e, #eab308, #f97316, #ef4444)"></div>

        <img src="totaliser.webp" alt="Blue Peter totaliser" class="mx-auto">
    </div>

    <audio id="tune" src="bluepeter.mp3" preload="auto"></audio>

    <button id="tune-toggle"
            class="fixed bottom-4 right-4 font-display text-sm text-white font-bold py-2 px-4 rounded-full transition-all duration-200 hover:scale-105 opacity-0 pointer-events-none"
            style="background: rgba(26,5,53,0.85); border: 2px solid #f97316; box-shadow: 0 4px 16px rgba(249,115,22,0.3)">
        🔊 ⏹
    </button>

    <script>
        // --- TO UPDATE THE AMOUNTS, CHANGE THESE VALUES ---
        const passDates = [
            "2026-06-06", // r
            "2026-06-16", // j
            "2026-06-17", // a
            "2026-06-18", // g
            "2026-06-18", // a
            "2026-06-22", // r
            "2026-06-22", // e
        ];
        const pendingTotal = 4;   // Number of people awaiting results
        const failedTotal = 2;
        // ---------------------------------------------------

        const passedTotal = passDates.length;
        const attemptedTotal = passedTotal + failedTotal + pendingTotal;

        const passedEl = document.getElementById('passedCount');
        const pendingEl = document.getElementById('pendingCount');
        const attemptedEl = document.getElementById('attemptedCount');
        const revealOverlay = document.getElementById('reveal-overlay');
        const revealButton = document.getElementById('reveal-button');
        const mainContent = document.getElementById('main-content');

        const tune = document.getElementById('tune');
        const tuneToggle = document.getElementById('tune-toggle');

        tuneToggle.addEventListener('click', () => {
            if (tune.paused) {
                tune.play().catch(() => {});
                tuneToggle.textContent = '🔊 ⏹';
            } else {
                tune.pause();
                tune.currentTime = 0;
                tuneToggle.textContent = '🔊 ▶';
            }
        });

        tune.addEventListener('ended', () => {
            tuneToggle.textContent = '🔊 ▶';
        });

        function buildChartData() {
            const sorted = [...passDates].sort();
            const counts = {};
            for (const d of sorted) {
                counts[d] = (counts[d] || 0) + 1;
            }
            let cumulative = 0;
            const points = Object.keys(counts).map(d => {
                cumulative += counts[d];
                return { x: d, y: cumulative };
            });
            return points;
        }

        function initChart() {
            const points = buildChartData();
            const ctx = document.getElementById('passChart').getContext('2d');

            const gradient = ctx.createLinearGradient(0, 0, 0, 220);
            gradient.addColorStop(0, 'rgba(234, 179, 8, 0.35)');
            gradient.addColorStop(0.5, 'rgba(249, 115, 22, 0.2)');
            gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        data: points,
                        borderColor: '#f97316',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        pointBackgroundColor: '#eab308',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 9,
                        fill: true,
                        stepped: true,
                        tension: 0,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#12022a',
                            borderColor: '#f97316',
                            borderWidth: 1,
                            titleColor: '#fde047',
                            bodyColor: '#fff',
                            callbacks: {
                                title: items => items[0].label,
                                label: item => ` ${item.raw.y} passed`,
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day', tooltipFormat: 'yyyy-MM-dd', displayFormats: { day: 'MMM d' } },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Poppins' } },
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Poppins' },
                                stepSize: 1,
                                precision: 0,
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        }
                    }
                }
            });
        }

        function updateDisplay() {
            animateCount(passedEl, passedTotal);
            animateCount(pendingEl, pendingTotal);
            animateCount(attemptedEl, attemptedTotal);
            initChart();
        }

        function playSound() {
            tune.currentTime = 0;
            tune.play().catch(() => {});
        }

        function animateCount(element, target, duration = 1000) {
            const start = parseInt(element.textContent.replace('%', '')) || 0;
            if (start === target) { element.textContent = target; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                element.textContent = Math.floor(progress * (target - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.textContent = target;
            };
            window.requestAnimationFrame(step);
        }

        function animateRate(element, target, duration = 1500) {
            const start = parseFloat(element.textContent) || 0;
            if (start === target) { element.textContent = `${target.toFixed(1)}%`; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (target - start) + start;
                element.textContent = `${current.toFixed(1)}%`;
                if (progress < 1) window.requestAnimationFrame(step);
                else element.textContent = `${target.toFixed(1)}%`;
            };
            window.requestAnimationFrame(step);
        }

        revealButton.addEventListener('click', () => {
            playSound();
            updateDisplay();
            revealOverlay.style.opacity = '0';
            revealOverlay.style.pointerEvents = 'none';
            mainContent.style.opacity = '1';
            tuneToggle.style.opacity = '1';
            tuneToggle.style.pointerEvents = 'auto';
        }, { once: true });
    </script>
</body>
</html>
