<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Certified Architect - Foundations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tone@15.0.4/build/Tone.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #111827;
        }
        .font-display {
            font-family: 'Russo One', sans-serif;
        }
        .number-flicker {
            transition: all 0.3s ease-in-out;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(168, 85, 247, 0.5);
        }
        .card {
            @apply bg-gray-800/50 backdrop-blur-sm border border-gray-700 rounded-2xl shadow-2xl p-4 sm:p-6 text-center transition-all duration-300 flex flex-col justify-center;
        }
        #reveal-overlay {
            transition: opacity 0.5s ease-in-out;
        }
        #main-content {
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <!-- Click to Reveal Overlay -->
    <div id="reveal-overlay" class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-50 text-center p-4">
        <div class="text-6xl mb-4">🎓</div>
        <h1 class="font-display text-3xl sm:text-5xl font-bold tracking-wider text-purple-300">Claude Certified Architect</h1>
        <p class="font-display text-xl sm:text-2xl text-purple-400 mt-1">Foundations</p>
        <button id="reveal-button" class="mt-8 font-display text-2xl bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-8 rounded-full shadow-lg shadow-purple-500/30 transform transition-transform duration-200 hover:scale-105">
            CLICK TO REVEAL TOTAL
        </button>
    </div>

    <div id="main-content" class="w-full max-w-3xl mx-auto space-y-6 sm:space-y-8 opacity-0">
        <!-- Header -->
        <header class="text-center">
            <div class="text-5xl mb-2">🎓</div>
            <h1 class="font-display text-3xl sm:text-4xl font-bold tracking-wider text-purple-300">Claude Certified Architect</h1>
            <p class="font-display text-xl text-purple-400">Foundations</p>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <!-- Passed -->
            <div class="card">
                <h3 class="font-display text-xl sm:text-2xl text-green-300 mb-2">PASSED</h3>
                <div id="passedCount" class="text-5xl sm:text-6xl font-bold text-white number-flicker">0</div>
            </div>

            <!-- Awaiting Results -->
            <div class="card">
                <h3 class="font-display text-xl sm:text-2xl text-amber-300 mb-2">AWAITING RESULTS</h3>
                <div id="pendingCount" class="text-5xl sm:text-6xl font-bold text-white number-flicker">0</div>
            </div>

            <!-- Attempted -->
            <div class="card">
                <h3 class="font-display text-xl sm:text-2xl text-cyan-300 mb-2">ATTEMPTED</h3>
                <div id="attemptedCount" class="text-5xl sm:text-6xl font-bold text-white number-flicker">0</div>
            </div>
        </div>

        <!-- Pass Rate (Bottom) -->
        <div class="bg-gradient-to-br from-purple-500 to-indigo-600 p-1 rounded-3xl shadow-2xl shadow-purple-500/20">
            <div class="bg-gray-900 rounded-2xl p-6 sm:p-8 text-center">
                <h2 class="font-display text-2xl sm:text-3xl font-bold tracking-widest text-gray-300 uppercase">Pass Rate</h2>
                <div id="passRate" class="font-display text-6xl sm:text-8xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-purple-300 to-white number-flicker py-4">0%</div>
            </div>
        </div>
    </div>

    <script>
        // --- TO UPDATE THE AMOUNTS, CHANGE THESE VALUES ---
        const passedTotal = 0;    // Number of people who passed
        const pendingTotal = 0;   // Number of people awaiting results
        const attemptedTotal = 0; // Total number of people who attempted
        // ---------------------------------------------------

        const passedEl = document.getElementById('passedCount');
        const pendingEl = document.getElementById('pendingCount');
        const attemptedEl = document.getElementById('attemptedCount');
        const passRateEl = document.getElementById('passRate');
        const revealOverlay = document.getElementById('reveal-overlay');
        const revealButton = document.getElementById('reveal-button');
        const mainContent = document.getElementById('main-content');

        let totalUpdateSynth;

        function updateDisplay() {
            animateCount(passedEl, passedTotal);
            animateCount(pendingEl, pendingTotal);
            animateCount(attemptedEl, attemptedTotal);
            animateRate(passRateEl, attemptedTotal > 0 ? (passedTotal / attemptedTotal) * 100 : 0);
        }

        function playSound() {
            if (totalUpdateSynth) {
                Tone.start().then(() => {
                    totalUpdateSynth.triggerAttackRelease("G4", "4n", Tone.now() + 0.1);
                    totalUpdateSynth.triggerAttackRelease("C5", "4n", Tone.now() + 0.3);
                }).catch(e => {
                    console.warn("Audio could not be started automatically: ", e);
                });
            }
        }

        function animateCount(element, target, duration = 1000) {
            const start = parseInt(element.textContent.replace('%', '')) || 0;
            if (start === target) { element.textContent = target; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                element.textContent = Math.floor(progress * (target - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.textContent = target;
            };
            window.requestAnimationFrame(step);
        }

        function animateRate(element, target, duration = 1500) {
            const start = parseFloat(element.textContent) || 0;
            if (start === target) { element.textContent = `${target.toFixed(1)}%`; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (target - start) + start;
                element.textContent = `${current.toFixed(1)}%`;
                if (progress < 1) window.requestAnimationFrame(step);
                else element.textContent = `${target.toFixed(1)}%`;
            };
            window.requestAnimationFrame(step);
        }

        try {
            totalUpdateSynth = new Tone.FMSynth({
                harmonicity: 3,
                modulationIndex: 10,
                detune: 0,
                oscillator: { type: "sine" },
                envelope: { attack: 0.01, decay: 0.2, sustain: 0.5, release: 0.8 },
                modulation: { type: "square" },
                modulationEnvelope: { attack: 0.1, decay: 0, sustain: 1, release: 0.5 }
            }).toDestination();
        } catch (e) {
            console.error("Could not initialize Tone.js audio engine.", e);
            totalUpdateSynth = null;
        }

        revealButton.addEventListener('click', () => {
            playSound();
            updateDisplay();
            revealOverlay.style.opacity = '0';
            revealOverlay.style.pointerEvents = 'none';
            mainContent.style.opacity = '1';
        }, { once: true });
    </script>
</body>
</html>
